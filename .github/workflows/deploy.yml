name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Environnement cible
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Simuler le deploiement staging
        run: echo "Deploiement staging depuis main."

  build-pages:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'staging' }}

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Envoyer les fichiers Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deployer GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  self-hosted-proof:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    runs-on: self-hosted

    steps:
      - name: Prouver l'execution locale
        run: |
          hostname
          whoami
