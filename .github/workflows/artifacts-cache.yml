name: Artifacts and Cache

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js avec cache npm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Generer le rapport
        run: |
          mkdir -p dist
          {
            echo "Build #${{ github.run_number }}"
            date
          } > dist/report.txt

      - name: Envoyer l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: dist/report.txt
          retention-days: 3

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Recuperer l'artefact
        uses: actions/download-artifact@v4
        with:
          name: build-report
          path: dist

      - name: Afficher le rapport
        run: cat dist/report.txt
