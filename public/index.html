<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub Actions Lab</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        background: #f6f8fa;
        color: #24292f;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100% - 32px));
        border: 1px solid #d0d7de;
        border-radius: 8px;
        background: #ffffff;
        padding: 32px;
      }

      h1 {
        margin-top: 0;
      }

      code {
        background: #f6f8fa;
        border-radius: 4px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GitHub Actions Lab</h1>
      <p>Page de demonstration de l'exercice 12, deployee avec GitHub Pages.</p>
      <p>Le contenu est publie depuis le dossier <code>public</code>.</p>
    </main>
  </body>
</html>
